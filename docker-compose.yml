services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: docproc:2.0
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./docproc.yaml:/app/docproc.yaml:ro
    environment:
      - DOCPROC_CONFIG=/app/docproc.yaml
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/docproc
    depends_on:
      - postgres

  frontend:
    image: docproc:2.0
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    environment:
      - DOCPROC_API_URL=http://api:8000
      - HOME=/tmp
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docproc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
