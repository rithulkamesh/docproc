# docproc edu — dev services only (postgres, rabbitmq, localstack)
# API and web run locally via: just dev
# Run from demo/: docker compose up -d
name: docproc-edu

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docproc
      POSTGRES_PASSWORD: docproc
      POSTGRES_DB: docproc
    ports:
      - "5432:5432"
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docproc"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: s3
      DEBUG: "0"
      LS_LOG: "warning"
      PERSISTENCE: "0"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: docproc
      RABBITMQ_DEFAULT_PASS: docproc
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  demo_pgdata: {}
