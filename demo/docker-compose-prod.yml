# docproc edu — full stack (infra + API + worker + web)
# Use for prod-like runs or when you don't want to run API/web locally.
# Run from demo/: docker compose -f docker-compose-prod.yml up -d
# Web: http://localhost:3000  API: http://localhost:8080
#
# AI config: set in the app via Settings (stored encrypted in DB). For CLI-only use, set
# OPENAI_* / AZURE_* in .env; do not pass them to API/worker here (server uses DB).
# Set DOCPROC_ENCRYPTION_KEY in .env (32 bytes or passphrase) so the API can encrypt stored keys.
name: docproc-edu

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: docproc
      POSTGRES_PASSWORD: docproc
      POSTGRES_DB: docproc
    ports:
      - "5432:5432"
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docproc"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      SERVICES: s3
      DEBUG: "0"
      LS_LOG: "warning"
      PERSISTENCE: "0"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: docproc
      RABBITMQ_DEFAULT_PASS: docproc
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://docproc:docproc@postgres:5432/docproc?sslmode=disable
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: docproc-demo
      AWS_REGION: us-east-1
      MQ_URL: amqp://docproc:docproc@rabbitmq:5672/
      DOCPROC_ENCRYPTION_KEY: ${DOCPROC_ENCRYPTION_KEY:-}
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      localstack: { condition: service_started }

  worker:
    build:
      context: ..
      dockerfile: demo/Dockerfile.worker
    command: ["/app/demo", "--worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://docproc:docproc@postgres:5432/docproc?sslmode=disable
      S3_ENDPOINT: http://localstack:4566
      S3_BUCKET: docproc-demo
      AWS_REGION: us-east-1
      MQ_URL: amqp://docproc:docproc@rabbitmq:5672/
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      localstack: { condition: service_started }
      api: { condition: service_started }

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_DOCPROC_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  demo_pgdata: {}
